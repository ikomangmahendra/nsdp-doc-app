<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (page(); as pageRef) {
      <div>
        <h2 data-cy="pageDetailsHeading"><span>Page</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ pageRef.id }}</span>
          </dd>
          <dt><span>Name</span></dt>
          <dd>
            <span>{{ pageRef.name }}</span>
          </dd>
          <dt><span>Title</span></dt>
          <dd>
            <span>{{ pageRef.title }}</span>
          </dd>
          <dt><span>Section</span></dt>
          <dd>
            @if (page()!.section) {
              <div>
                <a [routerLink]="['/nsdpdocapp/section', page()!.section?.id, 'view']">{{ pageRef.section?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/nsdpdocapp/page', pageRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
